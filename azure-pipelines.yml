trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  azureServiceConnection: 'My_Service'
  acrName: 'aacrsrnterraform26'
  resourceGroup: 'Student-Result-Notifier'
  vmName: 'vm-srn-app'
  imageName: 'student-result-notifier'
  imageTag: '$(Build.BuildId)'

stages:

# ---------------- STAGE 1: TERRAFORM ----------------
- stage: Terraform_Infrastructure
  displayName: 'Stage 1 - Provision Infrastructure with Terraform'
  jobs:
    - job: Terraform_Apply
      displayName: 'Terraform Init, Validate, Plan, Apply'
      steps:
        - task: AzureCLI@2
          displayName: 'Terraform Init & Apply'
          inputs:
            azureSubscription: $(azureServiceConnection)
            scriptType: 'bash'
            scriptLocation: 'inlineScript'
            inlineScript: |
              curl -o terraform.zip https://releases.hashicorp.com/terraform/1.7.5/terraform_1.7.5_linux_amd64.zip
              unzip terraform.zip
              sudo mv terraform /usr/local/bin/

              cd Terraform

              terraform init
              terraform validate
              terraform plan -var="admin_password=$(vm_admin_password)" -out=tfplan
              terraform apply -auto-approve tfplan

# ---------------- STAGE 2: DOCKER BUILD & PUSH ----------------
- stage: Docker_Build_Push
  displayName: 'Stage 2 - Build and Push Docker Image to ACR'
  dependsOn: Terraform_Infrastructure
  jobs:
    - job: Docker_Build
      displayName: 'Build and Push Image'
      steps:
        - task: AzureCLI@2
          displayName: 'ACR Build and Push'
          inputs:
            azureSubscription: $(azureServiceConnection)
            scriptType: 'bash'
            scriptLocation: 'inlineScript'
            inlineScript: |
              cd Docker
              az acr build --registry $(acrName) --image $(imageName):$(imageTag) .

# ---------------- STAGE 3: DEPLOY TO VM ----------------
- stage: Deploy_To_VM
  displayName: 'Stage 3 - Deploy Container to VM'
  dependsOn: Docker_Build_Push
  jobs:
    - job: Deploy
      displayName: 'SSH into VM and Run Container'
      steps:
        - task: AzureCLI@2
          displayName: 'Get VM Public IP'
          inputs:
            azureSubscription: $(azureServiceConnection)
            scriptType: 'bash'
            scriptLocation: 'inlineScript'
            inlineScript: |
              VM_IP=$(az vm show -d -g $(resourceGroup) -n $(vmName) --query publicIps -o tsv)
              echo "##vso[task.setvariable variable=VM_PUBLIC_IP]$VM_IP"

        - task: AzureCLI@2
          displayName: 'Deploy Container via SSH'
          inputs:
            azureSubscription: $(azureServiceConnection)
            scriptType: 'bash'
            scriptLocation: 'inlineScript'
            inlineScript: |
              ACR_LOGIN_SERVER=$(az acr show --name $(acrName) --query loginServer -o tsv)
              ACR_USERNAME=$(az acr credential show --name $(acrName) --query username -o tsv)
              ACR_PASSWORD=$(az acr credential show --name $(acrName) --query passwords[0].value -o tsv)

              sshpass -p "$(vm_admin_password)" ssh -o StrictHostKeyChecking=no azureadmin@$(VM_PUBLIC_IP) "
                sudo docker login $ACR_LOGIN_SERVER -u $ACR_USERNAME -p $ACR_PASSWORD &&
                sudo docker pull $ACR_LOGIN_SERVER/$(imageName):$(imageTag) &&
                sudo docker stop app-container || true &&
                sudo docker rm app-container || true &&
                sudo docker run -d --name app-container -p 80:80 $ACR_LOGIN_SERVER/$(imageName):$(imageTag)
              "